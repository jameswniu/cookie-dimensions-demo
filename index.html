<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cookie Dimensions Explorer</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --surface3: #222233;
    --border: #2a2a3d;
    --text: #e0e0f0;
    --text-dim: #8888aa;
    --accent: #6366f1;
    --accent-glow: rgba(99,102,241,.25);
    --meta-blue: #1877f2;
    --meta-glow: rgba(24,119,242,.3);
    --google-red: #ea4335;
    --amazon-orange: #ff9900;
    --danger: #ef4444;
    --warn: #f59e0b;
    --safe: #22c55e;
    --info: #3b82f6;
    --purple: #a855f7;
    --pink: #ec4899;
    --cyan: #06b6d4;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  html { font-size:14px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

  /* ── Header ── */
  .header {
    padding: 2rem 3rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(99,102,241,.06) 0%, transparent 100%);
  }
  .header h1 {
    font-family: var(--font);
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -.02em;
    background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p { color: var(--text-dim); margin-top:.4rem; font-size:.9rem; }

  /* ── Dimension Tabs ── */
  .dim-tabs {
    display: flex;
    gap: .5rem;
    padding: 1rem 3rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .dim-tab {
    padding: .6rem 1.2rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font);
    font-size: .8rem;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .dim-tab:hover { border-color: var(--accent); color: var(--text); }
  .dim-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .dim-tab .tab-icon { font-size: 1rem; }
  .dim-tab .tab-count {
    background: rgba(255,255,255,.15);
    padding: .1rem .45rem;
    border-radius: 4px;
    font-size: .7rem;
  }

  /* ── Main Layout ── */
  .main { display: flex; min-height: calc(100vh - 140px); }

  .sidebar {
    width: 320px;
    min-width: 320px;
    border-right: 1px solid var(--border);
    background: var(--surface);
    overflow-y: auto;
    max-height: calc(100vh - 140px);
    position: sticky;
    top: 60px;
  }

  .content {
    flex: 1;
    padding: 2rem 3rem;
    overflow-y: auto;
  }

  /* ── Cookie List (sidebar) ── */
  .cookie-list-header {
    padding: 1rem 1.2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .cookie-list-header h3 { font-size: .85rem; color: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing:.05em; }

  .cookie-search {
    width: 100%;
    padding: .5rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: .8rem;
    margin: .8rem 1.2rem;
    width: calc(100% - 2.4rem);
  }
  .cookie-search:focus { outline:none; border-color: var(--accent); }

  .cookie-item {
    padding: .8rem 1.2rem;
    border-bottom: 1px solid rgba(42,42,61,.5);
    cursor: pointer;
    transition: all .15s;
    position: relative;
  }
  .cookie-item:hover { background: var(--surface2); }
  .cookie-item.active { background: var(--surface3); border-left: 3px solid var(--accent); }
  .cookie-item.meta-highlight {
    border-left: 3px solid var(--meta-blue);
    background: rgba(24,119,242,.05);
  }
  .cookie-item.meta-highlight.active {
    background: rgba(24,119,242,.12);
    border-left: 3px solid var(--meta-blue);
    box-shadow: inset 0 0 30px var(--meta-glow);
  }
  .cookie-name {
    font-family: var(--font);
    font-size: .8rem;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .cookie-domain { font-size: .7rem; color: var(--text-dim); margin-top:.2rem; }
  .cookie-badges { display: flex; gap:.3rem; margin-top:.4rem; flex-wrap: wrap; }

  .badge {
    font-size: .6rem;
    padding: .15rem .4rem;
    border-radius: 3px;
    font-family: var(--font);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .03em;
  }
  .badge-meta { background: rgba(24,119,242,.2); color: var(--meta-blue); }
  .badge-google { background: rgba(234,67,53,.15); color: var(--google-red); }
  .badge-amazon { background: rgba(255,153,0,.15); color: var(--amazon-orange); }
  .badge-tracker { background: rgba(239,68,68,.15); color: var(--danger); }
  .badge-analytics { background: rgba(168,85,247,.15); color: var(--purple); }
  .badge-functional { background: rgba(34,197,94,.15); color: var(--safe); }
  .badge-necessary { background: rgba(59,130,246,.15); color: var(--info); }
  .badge-session { background: rgba(6,182,212,.15); color: var(--cyan); }
  .badge-persistent { background: rgba(245,158,11,.15); color: var(--warn); }
  .badge-httponly { background: rgba(236,72,153,.15); color: var(--pink); }
  .badge-3p { background: rgba(239,68,68,.2); color: var(--danger); }
  .badge-1p { background: rgba(34,197,94,.15); color: var(--safe); }

  /* ── Detail Panel ── */
  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    color: var(--text-dim);
    text-align: center;
  }
  .detail-empty .icon { font-size: 4rem; margin-bottom: 1rem; opacity:.3; }

  .detail-panel { animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

  .detail-header {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    margin-bottom: 2rem;
    padding-bottom: 1.5rem;
    border-bottom: 1px solid var(--border);
  }
  .detail-header .source-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem;
    flex-shrink: 0;
  }
  .detail-header .source-icon.meta { background: rgba(24,119,242,.15); }
  .detail-header .source-icon.google { background: rgba(234,67,53,.1); }
  .detail-header .source-icon.amazon { background: rgba(255,153,0,.1); }
  .detail-header .source-icon.other { background: var(--surface3); }

  .detail-header h2 {
    font-family: var(--font);
    font-size: 1.3rem;
    font-weight: 700;
  }
  .detail-header .domain-label { color: var(--text-dim); font-size:.85rem; }

  /* ── Dimension Cards ── */
  .dim-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .dim-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    transition: all .2s;
  }
  .dim-card:hover { border-color: var(--accent); box-shadow: 0 0 20px rgba(99,102,241,.08); }
  .dim-card h4 {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-dim);
    margin-bottom: .8rem;
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .dim-card .value {
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 600;
  }
  .dim-card .sub { color: var(--text-dim); font-size:.75rem; margin-top:.3rem; line-height:1.4; }

  /* ── Raw Value Display ── */
  .raw-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1rem;
    margin-bottom: 1.5rem;
  }
  .raw-block h4 {
    font-size: .7rem;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-dim);
    margin-bottom: .6rem;
  }
  .raw-value {
    font-family: var(--font);
    font-size: .8rem;
    word-break: break-all;
    color: var(--warn);
    background: var(--surface);
    padding: .6rem .8rem;
    border-radius: 6px;
    max-height: 120px;
    overflow-y: auto;
    line-height: 1.5;
  }
  .decoded-value { color: var(--cyan); }

  /* ── Anatomy Diagram ── */
  .anatomy {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .anatomy h3 {
    font-size: .85rem;
    font-weight: 600;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: .5rem;
  }
  .anatomy-row {
    display: flex;
    align-items: center;
    padding: .5rem 0;
    border-bottom: 1px solid rgba(42,42,61,.4);
    gap: 1rem;
  }
  .anatomy-row:last-child { border-bottom: none; }
  .anatomy-label {
    font-family: var(--font);
    font-size: .75rem;
    color: var(--text-dim);
    width: 110px;
    flex-shrink: 0;
    text-align: right;
  }
  .anatomy-val {
    font-family: var(--font);
    font-size: .8rem;
    flex: 1;
  }
  .anatomy-indicator {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .ind-green { background: var(--safe); box-shadow: 0 0 6px rgba(34,197,94,.4); }
  .ind-red { background: var(--danger); box-shadow: 0 0 6px rgba(239,68,68,.4); }
  .ind-yellow { background: var(--warn); box-shadow: 0 0 6px rgba(245,158,11,.4); }
  .ind-blue { background: var(--info); box-shadow: 0 0 6px rgba(59,130,246,.4); }

  /* ── Timeline ── */
  .timeline-bar {
    height: 32px;
    background: var(--surface2);
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    margin: .6rem 0;
  }
  .timeline-fill {
    height: 100%;
    border-radius: 6px;
    position: absolute;
    left: 0;
    top: 0;
    display: flex;
    align-items: center;
    padding-left: .8rem;
    font-family: var(--font);
    font-size: .7rem;
    color: #fff;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── Privacy Score ── */
  .privacy-score {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.2rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 1.5rem;
  }
  .score-ring {
    width: 64px; height: 64px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font);
    font-size: 1.3rem;
    font-weight: 700;
    flex-shrink: 0;
    position: relative;
  }
  .score-ring::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 3px solid;
    opacity: .3;
  }
  .score-high { color: var(--danger); }
  .score-high::before { border-color: var(--danger); }
  .score-med { color: var(--warn); }
  .score-med::before { border-color: var(--warn); }
  .score-low { color: var(--safe); }
  .score-low::before { border-color: var(--safe); }

  /* ── Perception Viz ── */
  .perception-layers {
    display: flex;
    flex-direction: column;
    gap: .3rem;
  }
  .perc-layer {
    display: flex;
    align-items: center;
    gap: .8rem;
    padding: .6rem .8rem;
    border-radius: 6px;
    background: var(--surface2);
    font-size: .8rem;
  }
  .perc-layer .perc-icon { font-size: 1.1rem; width: 24px; text-align: center; }
  .perc-layer .perc-label { flex: 1; }
  .perc-layer .perc-status {
    font-family: var(--font);
    font-size: .7rem;
    font-weight: 600;
    padding: .15rem .5rem;
    border-radius: 4px;
  }
  .perc-visible { background: rgba(239,68,68,.12); color: var(--danger); }
  .perc-hidden { background: rgba(34,197,94,.12); color: var(--safe); }

  /* ── Aggregate stats bar ── */
  .stats-bar {
    display: flex;
    gap: 1.5rem;
    padding: 1rem 3rem;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .stat-item {
    display: flex;
    align-items: center;
    gap: .4rem;
  }
  .stat-num {
    font-family: var(--font);
    font-size: 1.1rem;
    font-weight: 700;
  }
  .stat-label { font-size: .75rem; color: var(--text-dim); }

  /* ── Tracking Flow Diagram ── */
  .flow-diagram {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }
  .flow-diagram h3 { font-size:.85rem; font-weight:600; margin-bottom:1rem; }
  .flow-steps {
    display: flex;
    align-items: center;
    gap: .5rem;
    flex-wrap: wrap;
  }
  .flow-step {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .6rem 1rem;
    font-size: .75rem;
    text-align: center;
    min-width: 100px;
  }
  .flow-step.highlighted {
    border-color: var(--meta-blue);
    background: rgba(24,119,242,.08);
    box-shadow: 0 0 15px var(--meta-glow);
  }
  .flow-arrow { color: var(--text-dim); font-size: 1.2rem; }
  .flow-step strong { display:block; font-family:var(--font); font-size:.7rem; margin-bottom:.2rem; }

  /* ── Section Headers ── */
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: .5rem;
    padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
  }

  /* ── Overview Dashboard (when no cookie selected, per dimension) ── */
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 1rem;
    margin-bottom: 2rem;
  }
  .overview-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.2rem;
    text-align: center;
    cursor: pointer;
    transition: all .2s;
  }
  .overview-card:hover { border-color: var(--accent); transform: translateY(-2px); }
  .overview-card .big-num {
    font-family: var(--font);
    font-size: 2.4rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: .4rem;
  }
  .overview-card .card-label {
    font-size: .75rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: .04em;
  }

  /* ── Chart bars ── */
  .bar-chart { margin: 1rem 0; }
  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: .4rem;
    gap: .8rem;
  }
  .bar-label {
    font-family: var(--font);
    font-size: .7rem;
    width: 120px;
    text-align: right;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .bar-track {
    flex: 1;
    height: 20px;
    background: var(--surface2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }
  .bar-fill {
    height: 100%;
    border-radius: 4px;
    display: flex;
    align-items: center;
    padding-left: .5rem;
    font-family: var(--font);
    font-size: .65rem;
    color: #fff;
    font-weight: 600;
    transition: width .6s ease;
  }

  /* ── Fingerprint section ── */
  .fingerprint-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: .5rem;
  }
  .fp-cell {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: .6rem;
    font-family: var(--font);
    font-size: .65rem;
    text-align: center;
    transition: all .2s;
  }
  .fp-cell:hover { border-color: var(--accent); }
  .fp-cell .fp-label { color: var(--text-dim); margin-bottom:.2rem; font-size:.6rem; text-transform:uppercase; }
  .fp-cell .fp-val { font-weight: 600; word-break: break-all; }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main { flex-direction: column; }
    .sidebar { width: 100%; min-width: unset; max-height: 40vh; position: static; }
    .content { padding: 1.5rem; }
    .header { padding: 1.5rem; }
    .dim-tabs { padding: .8rem 1.5rem; overflow-x: auto; }
    .stats-bar { padding: .8rem 1.5rem; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Cookie Dimensions Explorer</h1>
  <p>Deep-dive into every tracking cookie on any page - perception, structure, source, and time continuity</p>
</div>

<div class="stats-bar" id="statsBar"></div>

<div class="dim-tabs" id="dimTabs">
  <button class="dim-tab active" data-dim="all">
    <span class="tab-icon">*</span> All <span class="tab-count" id="count-all">0</span>
  </button>
  <button class="dim-tab" data-dim="perception">
    <span class="tab-icon">&#x1f441;</span> Perception <span class="tab-count" id="count-perception">0</span>
  </button>
  <button class="dim-tab" data-dim="structure">
    <span class="tab-icon">&#x1f9ec;</span> Structure <span class="tab-count" id="count-structure">0</span>
  </button>
  <button class="dim-tab" data-dim="source">
    <span class="tab-icon">&#x1f4e1;</span> Source <span class="tab-count" id="count-source">0</span>
  </button>
  <button class="dim-tab" data-dim="time">
    <span class="tab-icon">&#x23f3;</span> Time <span class="tab-count" id="count-time">0</span>
  </button>
</div>

<div class="main">
  <div class="sidebar">
    <div class="cookie-list-header">
      <h3>Cookies</h3>
      <span id="totalCount" style="font-family:var(--font);font-size:.8rem;color:var(--accent)">0</span>
    </div>
    <input class="cookie-search" id="searchInput" placeholder="Filter cookies..." />
    <div id="cookieList"></div>
  </div>
  <div class="content" id="detailContent">
    <div class="detail-empty">
      <div class="icon">&#x1f36a;</div>
      <h3>Select a cookie to explore</h3>
      <p style="margin-top:.5rem;color:var(--text-dim)">Or browse the dimension overviews above</p>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// COOKIE KNOWLEDGE BASE - fingerprint patterns for known trackers
// ═══════════════════════════════════════════════════════════════════
const KNOWN_COOKIES = {
  // ── Meta / Facebook ──
  '_fbp':       { source:'Meta', category:'advertising', purpose:'Facebook Pixel browser ID. Identifies browsers for ad targeting across the Meta Audience Network. Set by the Meta Pixel JS even on sites that never asked for it.', risk:9, party:'3rd', mechanism:'JS pixel drop', persistence:'90 days rolling', respawns: true },
  '_fbc':       { source:'Meta', category:'advertising', purpose:'Facebook Click ID. Stores the fbclid URL parameter from Meta ad clicks. Links your visit back to the exact ad you clicked so Meta can attribute the conversion.', risk:9, party:'3rd', mechanism:'JS pixel on fbclid detection', persistence:'90 days rolling', respawns: true },
  'fr':         { source:'Meta', category:'advertising', purpose:'Primary Meta ad-delivery and retargeting cookie. Contains an encrypted user fragment + timestamp. This is the main cookie Meta uses to show you "relevant" ads across the internet.', risk:10, party:'3rd', mechanism:'facebook.com iframe/pixel', persistence:'90 days', respawns: true },
  'datr':       { source:'Meta', category:'functional', purpose:'Browser-level identifier set by facebook.com. Persists even when logged out. Meta claims it is for "security" but it uniquely fingerprints your browser across all sites with Facebook social plugins.', risk:8, party:'3rd', mechanism:'facebook.com domain', persistence:'2 years', respawns: true },
  'sb':         { source:'Meta', category:'functional', purpose:'Facebook session bookkeeping. Stores browser-level identification to "secure" your account. In practice, another persistent fingerprint.', risk:6, party:'3rd', mechanism:'facebook.com domain', persistence:'2 years', respawns: false },

// ENRICHMENT ENGINE - classify every cookie across all dimensions
// ═══════════════════════════════════════════════════════════════════
function enrichCookie(c) {
  const e = { ...c };
  // Look up in knowledge base
  let kb = KNOWN_COOKIES[c.name];
  if (!kb) {
    for (const pm of PATTERN_MATCHERS) {
      if (pm.pattern.test(c.name)) {
        kb = pm.template ? KNOWN_COOKIES[pm.template] : pm;
        break;
      }
    }
  }

  if (kb) {
    e.source = kb.source || 'Unknown';
    e.category = kb.category || 'unknown';
    e.purpose = kb.purpose || '';
    e.risk = kb.risk ?? 5;
    e.party = kb.party || (c.domain.startsWith('.') && !c.domain.includes('currentsite') ? '3rd' : '1st');
    e.mechanism = kb.mechanism || 'unknown';
    e.persistenceNote = kb.persistence || '';
    e.respawns = kb.respawns || false;
  } else {
    // Heuristic classification
    e.source = guessSource(c);
    e.category = guessCategory(c);
    e.purpose = 'Unknown cookie - not in the fingerprint database.';
    e.risk = guessRisk(c);
    e.party = c.domain.includes('currentsite') ? '1st' : '3rd';
    e.mechanism = c.httpOnly ? 'server Set-Cookie' : 'JavaScript';
    e.persistenceNote = '';
    e.respawns = false;
  }

  // Time dimension
  if (c.expires) {
    const exp = new Date(c.expires);
    const now = new Date();
    e.ttlMs = exp - now;
    e.ttlDays = Math.round(e.ttlMs / (1000*60*60*24));
    e.timeClass = e.ttlDays <= 1 ? 'ephemeral' : e.ttlDays <= 30 ? 'short' : e.ttlDays <= 365 ? 'medium' : 'long';
    e.isSession = false;
  } else {
    e.ttlMs = 0;
    e.ttlDays = 0;
    e.timeClass = 'session';
    e.isSession = true;
  }

  // Structure dimension
  e.encoding = detectEncoding(c.value);
  e.namePattern = detectNamePattern(c.name);

  return e;
}

function guessSource(c) {
  const d = c.domain.toLowerCase();
  if (d.includes('facebook') || d.includes('fbcdn')) return 'Meta';
  if (d.includes('google') || d.includes('doubleclick') || d.includes('youtube')) return 'Google';
  if (d.includes('amazon') || d.includes('amazonaws')) return 'Amazon';
  if (d.includes('linkedin')) return 'LinkedIn';
  if (d.includes('tiktok')) return 'TikTok';
  if (d.includes('cloudflare')) return 'Cloudflare';
  return 'Site';
}

function guessCategory(c) {
  const n = c.name.toLowerCase();
  if (n.includes('session') || n.includes('csrf') || n.includes('token')) return 'necessary';
  if (n.includes('consent') || n.includes('cookie')) return 'necessary';
  if (n.includes('_ga') || n.includes('_gid') || n.includes('hj') || n.includes('_pk')) return 'analytics';
  if (n.includes('_fb') || n.includes('_gcl') || n.includes('ad') || n.includes('_tt')) return 'advertising';
  return 'functional';
}

function guessRisk(c) {
  let r = 3;
  if (c.domain.includes('currentsite')) r -= 1; else r += 2;
  if (!c.httpOnly) r += 1;
  if (c.sameSite === 'None') r += 1;
  if (c.size > 100) r += 1;
  if (c.expires && new Date(c.expires) - new Date() > 365*24*60*60*1000) r += 1;
  return Math.min(10, Math.max(0, r));
}

function detectEncoding(val) {
  if (!val) return 'empty';
  if (val.startsWith('{') || val.startsWith('[')) return 'JSON';
  if (/^[A-Za-z0-9+/=]{20,}$/.test(val) && val.length % 4 === 0) return 'Base64';
  if (/^[0-9a-f]{32,}$/i.test(val)) return 'Hex';
  if (/^eyJ/.test(val)) return 'JWT/Base64';
  if (/^\d+\.\d+\.\d+/.test(val)) return 'Dotted ID';
  if (/^[0-9a-f]{8}-/.test(val)) return 'UUID';
  if (/^".*"$/.test(val)) return 'Quoted string';
  if (/^\d+$/.test(val)) return 'Numeric';
  if (val.includes('|')) return 'Pipe-delimited';
  return 'Opaque';
}

function detectNamePattern(name) {
  if (name.startsWith('_fb') || name.startsWith('_fbc')) return 'Meta prefix (_fb*)';
  if (name.startsWith('_ga') || name.startsWith('_gid') || name.startsWith('_gcl')) return 'Google prefix (_g*)';
  if (name.startsWith('__')) return 'Double-underscore (server/infra)';
  if (name.startsWith('_')) return 'Single-underscore (tracker convention)';
  if (name.startsWith('ajs_')) return 'Segment prefix (ajs_*)';
  if (name.startsWith('_hj')) return 'Hotjar prefix (_hj*)';
  if (name.startsWith('_pk')) return 'Matomo prefix (_pk*)';
  if (name.startsWith('_pin')) return 'Pinterest prefix (_pin*)';
  if (name.startsWith('li_')) return 'LinkedIn prefix (li_*)';
  return 'Custom';
}

function tryDecode(val) {
  // Try base64
  try {
    if (/^[A-Za-z0-9+/=]{16,}$/.test(val) || /^eyJ/.test(val)) {
      const decoded = atob(val.replace(/-/g,'+').replace(/_/g,'/'));
      if (/^[\x20-\x7E\n\r\t]+$/.test(decoded)) return { type: 'Base64', decoded };
    }
  } catch(e) {}
  // Try JSON parse
  try {
    const clean = val.replace(/^"|"$/g, '');
    const parsed = JSON.parse(clean);
    if (typeof parsed === 'object') return { type: 'JSON', decoded: JSON.stringify(parsed, null, 2) };
  } catch(e) {}
  // Try URL decode
  try {
    const decoded = decodeURIComponent(val);
    if (decoded !== val) return { type: 'URL-encoded', decoded };
  } catch(e) {}
  return null;
}

function renderStats() {
  const bar = document.getElementById('statsBar');
  const metaCount = cookies.filter(c => c.source === 'Meta').length;
  const googleCount = cookies.filter(c => c.source === 'Google').length;
  const thirdParty = cookies.filter(c => c.party === '3rd').length;
  const trackers = cookies.filter(c => c.category === 'advertising').length;
  const httpOnlyCount = cookies.filter(c => c.httpOnly).length;
  const avgRisk = (cookies.reduce((s,c) => s + c.risk, 0) / cookies.length).toFixed(1);
  const totalBytes = cookies.reduce((s,c) => s + c.size, 0);

  bar.innerHTML = `
    <div class="stat-item"><span class="stat-num" style="color:var(--meta-blue)">${metaCount}</span><span class="stat-label">Meta</span></div>
    <div class="stat-item"><span class="stat-num" style="color:var(--google-red)">${googleCount}</span><span class="stat-label">Google</span></div>
    <div class="stat-item"><span class="stat-num" style="color:var(--danger)">${thirdParty}</span><span class="stat-label">Third-party</span></div>
    <div class="stat-item"><span class="stat-num" style="color:var(--warn)">${trackers}</span><span class="stat-label">Ad trackers</span></div>
    <div class="stat-item"><span class="stat-num" style="color:var(--pink)">${httpOnlyCount}</span><span class="stat-label">HttpOnly</span></div>
    <div class="stat-item"><span class="stat-num" style="color:var(--purple)">${avgRisk}</span><span class="stat-label">Avg risk</span></div>
    <div class="stat-item"><span class="stat-num" style="color:var(--cyan)">${totalBytes}</span><span class="stat-label">Total bytes</span></div>
  `;
}

function renderTabs() {
  document.getElementById('count-all').textContent = cookies.length;
  document.getElementById('count-perception').textContent = cookies.filter(c => !c.httpOnly || c.sameSite === 'None').length;
  document.getElementById('count-structure').textContent = cookies.length;
  document.getElementById('count-source').textContent = new Set(cookies.map(c => c.source)).size + ' sources';
  document.getElementById('count-time').textContent = cookies.filter(c => !c.isSession).length + ' persistent';
}

function getFilteredCookies() {
  let list = [...cookies];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    list = list.filter(c => c.name.toLowerCase().includes(q) || c.domain.toLowerCase().includes(q) || c.source.toLowerCase().includes(q));
  }
  // Sort: Meta first, then by risk desc
  list.sort((a,b) => {
    if (a.source === 'Meta' && b.source !== 'Meta') return -1;
    if (b.source === 'Meta' && a.source !== 'Meta') return 1;
    return b.risk - a.risk;
  });
  return list;
}

function getBadgeClass(c) {
  const src = c.source.toLowerCase();
  if (src === 'meta') return 'badge-meta';
  if (src === 'google') return 'badge-google';
  if (src === 'amazon') return 'badge-amazon';
  return '';
}

  const map = { advertising:'badge-tracker', analytics:'badge-analytics', functional:'badge-functional', necessary:'badge-necessary', authentication:'badge-necessary' };

function selectCookie(name, domain) {
  activeCookie = cookies.find(c => c.name === name && c.domain === domain);
  renderCookieList();
  renderDetail();
}

function renderDimensionOverview() {

    renderPerceptionOverview(panel);

    renderStructureOverview(panel);
  } else if (activeDim === 'time') {
    renderTimeOverview(panel);

          <span class="perc-icon">&#x1f465;</span>
          <span class="perc-label"><strong>User Awareness</strong> - The user sees NONE of these cookies during normal browsing. Zero perception.</span>
          <span class="perc-status perc-visible">${cookies.length} hidden</span>
        </div>
        <div class="perc-layer">
          <span class="perc-icon">&#x1f4dc;</span>
          <span class="perc-label"><strong>JavaScript Access</strong> - ${jsVisible} cookies readable by any script on the page (XSS attack surface)</span>
          <span class="perc-status ${jsVisible > httpOnlyCount ? 'perc-visible' : 'perc-hidden'}">${jsVisible} exposed</span>
        </div>
        <div class="perc-layer">
          <span class="perc-icon">&#x1f310;</span>
          <span class="perc-label"><strong>Cross-Site Leakage</strong> - ${noneCount} cookies sent to third-party servers on every request</span>
          <span class="perc-status ${noneCount > 0 ? 'perc-visible' : 'perc-hidden'}">${noneCount} leaking</span>
        </div>
        <div class="perc-layer">
          <span class="perc-icon">&#x1f6e1;</span>
          <span class="perc-label"><strong>Network Sniffing</strong> - ${cookies.length - secureCount} cookies transmittable over unencrypted HTTP</span>
          <span class="perc-status ${cookies.length - secureCount > 0 ? 'perc-visible' : 'perc-hidden'}">${cookies.length - secureCount} vulnerable</span>
        </div>
        <div class="perc-layer" style="background:rgba(34,197,94,.04)">
          <span class="perc-icon">&#x1f50d;</span>
          <span class="perc-label"><strong>DevTools</strong> - All ${cookies.length} cookies are visible here. This is the only complete view.</span>
          <span class="perc-status perc-visible">${cookies.length} visible</span>
        </div>
      </div>

      <h3 style="font-size:.9rem;margin-bottom:.8rem">SameSite Policy Distribution</h3>
      <div class="bar-chart">
        <div class="bar-row"><span class="bar-label">None (open)</span><div class="bar-track"><div class="bar-fill" style="width:${(noneCount/cookies.length)*100}%;background:var(--danger)">${noneCount}</div></div></div>
        <div class="bar-row"><span class="bar-label">Lax (moderate)</span><div class="bar-track"><div class="bar-fill" style="width:${(laxCount/cookies.length)*100}%;background:var(--warn)">${laxCount}</div></div></div>
        <div class="bar-row"><span class="bar-label">Strict (locked)</span><div class="bar-track"><div class="bar-fill" style="width:${(strictCount/cookies.length)*100}%;background:var(--safe)">${strictCount}</div></div></div>
      </div>
    </div>
  `;
}

function renderStructureOverview(panel) {
  const byEncoding = {};
  cookies.forEach(c => { byEncoding[c.encoding] = (byEncoding[c.encoding]||0)+1; });
  const byPattern = {};
  cookies.forEach(c => { byPattern[c.namePattern] = (byPattern[c.namePattern]||0)+1; });
  const totalBytes = cookies.reduce((s,c) => s+c.size, 0);
  const avgSize = Math.round(totalBytes / cookies.length);
  const maxSize = Math.max(...cookies.map(c => c.size));
  const dotDomains = cookies.filter(c => c.domain.startsWith('.')).length;

  panel.innerHTML = `
    <div class="detail-panel">
      <div class="section-title">&#x1f9ec; Structure Dimension Overview</div>
      <p style="color:var(--text-dim);margin-bottom:1.5rem;font-size:.85rem">How cookies are encoded, named, scoped, and sized. The technical anatomy.</p>

      <div class="overview-grid">
        <div class="overview-card">
          <div class="big-num" style="color:var(--cyan)">${totalBytes}</div>
          <div class="card-label">Total bytes</div>
        </div>
        <div class="overview-card">
          <div class="big-num" style="color:var(--accent)">${avgSize}B</div>
          <div class="card-label">Avg cookie size</div>
        </div>
        <div class="overview-card">
          <div class="big-num" style="color:var(--warn)">${maxSize}B</div>
          <div class="card-label">Largest cookie</div>
        </div>
        <div class="overview-card">
          <div class="big-num" style="color:var(--purple)">${dotDomains}</div>
          <div class="card-label">Wildcard domains</div>
        </div>
      </div>

      <h3 style="font-size:.9rem;margin-bottom:.8rem">Value Encoding Types</h3>
      <div class="bar-chart">
        ${Object.entries(byEncoding).sort((a,b)=>b[1]-a[1]).map(([enc, cnt]) => `
          <div class="bar-row"><span class="bar-label">${esc(enc)}</span><div class="bar-track"><div class="bar-fill" style="width:${(cnt/cookies.length)*100}%;background:var(--cyan)">${cnt}</div></div></div>
        `).join('')}
      </div>

      <h3 style="font-size:.9rem;margin:1.5rem 0 .8rem">Name Patterns</h3>
      <div class="bar-chart">
        ${Object.entries(byPattern).sort((a,b)=>b[1]-a[1]).map(([pat, cnt]) => `
          <div class="bar-row"><span class="bar-label" style="width:200px;font-size:.65rem">${esc(pat)}</span><div class="bar-track"><div class="bar-fill" style="width:${(cnt/cookies.length)*100}%;background:var(--purple)">${cnt}</div></div></div>
        `).join('')}
      </div>

      <h3 style="font-size:.9rem;margin:1.5rem 0 .8rem">Size Distribution</h3>
      <div class="bar-chart">
        ${cookies.sort((a,b)=>b.size-a.size).slice(0,10).map(c => `
          <div class="bar-row"><span class="bar-label">${esc(c.name)}</span><div class="bar-track"><div class="bar-fill" style="width:${(c.size/maxSize)*100}%;background:${c.source==='Meta' ? 'var(--meta-blue)' : c.source==='Google' ? 'var(--google-red)' : 'var(--accent)'}">${c.size}B</div></div></div>
        `).join('')}
      </div>
    </div>
  `;
}

function renderTimeOverview(panel) {
  const sessionCount = cookies.filter(c => c.isSession).length;
  const ephemeral = cookies.filter(c => !c.isSession && c.ttlDays <= 1).length;
  const shortTerm = cookies.filter(c => c.ttlDays > 1 && c.ttlDays <= 30).length;
  const medTerm = cookies.filter(c => c.ttlDays > 30 && c.ttlDays <= 365).length;
  const longTerm = cookies.filter(c => c.ttlDays > 365).length;
  const respawners = cookies.filter(c => c.respawns).length;
  const sorted = [...cookies].filter(c=>!c.isSession).sort((a,b) => b.ttlDays - a.ttlDays);
  const maxDays = sorted.length ? sorted[0].ttlDays : 1;

  panel.innerHTML = `
    <div class="detail-panel">
      <div class="section-title">&#x23f3; Time Continuity Overview</div>
      <p style="color:var(--text-dim);margin-bottom:1.5rem;font-size:.85rem">How long each cookie persists and whether it regenerates after deletion.</p>

      <div class="overview-grid">
        <div class="overview-card">
          <div class="big-num" style="color:var(--cyan)">${sessionCount}</div>
          <div class="card-label">Session (tab close)</div>
        </div>
        <div class="overview-card">
          <div class="big-num" style="color:var(--safe)">${ephemeral + shortTerm}</div>
          <div class="card-label">Short-lived (< 30d)</div>
        </div>
        <div class="overview-card">
          <div class="big-num" style="color:var(--warn)">${medTerm}</div>
          <div class="card-label">Medium (30d - 1yr)</div>
        </div>
        <div class="overview-card">
          <div class="big-num" style="color:var(--danger)">${longTerm}</div>
          <div class="card-label">Long-lived (1yr+)</div>
        </div>
      </div>

      <div class="privacy-score" style="border-color:var(--danger)">
        <div class="score-ring score-high" style="font-size:1.1rem">${respawners}</div>
        <div>
          <div style="font-weight:600;color:var(--danger)">Zombie Cookies (Respawners)</div>
          <div style="color:var(--text-dim);font-size:.8rem;margin-top:.2rem">${respawners} of ${cookies.length} cookies regenerate after deletion. Clearing cookies does not stop tracking by these entities.</div>
        </div>
      </div>

      <h3 style="font-size:.9rem;margin:1rem 0 .8rem">Lifetime Rankings</h3>
      <div class="bar-chart">
        ${sorted.slice(0,12).map(c => {
          const color = c.ttlDays > 365 ? 'var(--danger)' : c.ttlDays > 90 ? 'var(--warn)' : 'var(--safe)';
          return `
          <div class="bar-row">
            <span class="bar-label">${esc(c.name)}</span>
            <div class="bar-track">
              <div class="bar-fill" style="width:${(c.ttlDays/maxDays)*100}%;background:${color}">${c.ttlDays}d</div>
            </div>
          </div>
        `}).join('')}
      </div>

      <h3 style="font-size:.9rem;margin:1.5rem 0 .8rem">Time Classes</h3>
      <div class="bar-chart">
        <div class="bar-row"><span class="bar-label">Session</span><div class="bar-track"><div class="bar-fill" style="width:${(sessionCount/cookies.length)*100}%;background:var(--cyan)">${sessionCount}</div></div></div>
        <div class="bar-row"><span class="bar-label">Ephemeral</span><div class="bar-track"><div class="bar-fill" style="width:${(ephemeral/cookies.length)*100}%;background:var(--safe)">${ephemeral}</div></div></div>
        <div class="bar-row"><span class="bar-label">Short (1-30d)</span><div class="bar-track"><div class="bar-fill" style="width:${(shortTerm/cookies.length)*100}%;background:var(--info)">${shortTerm}</div></div></div>
        <div class="bar-row"><span class="bar-label">Medium (30d-1yr)</span><div class="bar-track"><div class="bar-fill" style="width:${(medTerm/cookies.length)*100}%;background:var(--warn)">${medTerm}</div></div></div>
        <div class="bar-row"><span class="bar-label">Long (1yr+)</span><div class="bar-track"><div class="bar-fill" style="width:${(longTerm/cookies.length)*100}%;background:var(--danger)">${longTerm}</div></div></div>
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════════════════════════════
// EVENT HANDLERS
// ═══════════════════════════════════════════════════════════════════
document.querySelectorAll('.dim-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.dim-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    activeDim = tab.dataset.dim;
    activeCookie = null;
    renderCookieList();
    renderDimensionOverview();
  });
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderCookieList();
});

function esc(s) { const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

// ── Initial render ──
renderStats();
renderTabs();
renderCookieList();
renderDimensionOverview();
</script>
</body>
</html>
