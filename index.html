<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta Tracking Deep Explorer</title>
<style>
:root{--bg:#0b0b16;--s1:#111122;--s2:#171730;--s3:#1e1e3a;--border:#2a2a48;--text:#d4d4e8;--dim:#6e6e9a;--gold:#e8b931;--gold-dim:rgba(232,185,49,.15);--gold-border:rgba(232,185,49,.4);--meta:#1877f2;--meta-dim:rgba(24,119,242,.12);--google:#ea4335;--danger:#ef4444;--warn:#f59e0b;--safe:#22c55e;--info:#3b82f6;--purple:#a855f7;--pink:#ec4899;--cyan:#06b6d4;--green-tag:#1a5c2e;--green-tag-text:#4ade80;--red-tag:#5c1a1a;--red-tag-text:#f87171;--blue-tag:#1a2a5c;--blue-tag-text:#60a5fa;--font:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace;--sans:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--s1)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Header */
.hdr{text-align:center;padding:2rem 2rem 1rem;background:linear-gradient(180deg,rgba(232,185,49,.04),transparent)}
.hdr h1{font-family:var(--font);font-size:1.5rem;font-weight:800;color:var(--gold);font-style:italic}
.hdr p{color:var(--dim);font-size:.8rem;margin-top:.3rem}

/* Scenario Selector */
.scenarios{display:flex;align-items:center;gap:.5rem;padding:.8rem 2rem;border-bottom:1px solid var(--border);background:var(--s1);flex-wrap:wrap}
.scenarios label{font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;font-weight:700;margin-right:.3rem}
.scn-btn{padding:.4rem .8rem;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--dim);font-family:var(--font);font-size:.65rem;cursor:pointer;transition:all .2s}
.scn-btn:hover{border-color:var(--gold);color:var(--text)}
.scn-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.scn-url{flex:1;min-width:200px;padding:.4rem .7rem;border-radius:5px;border:1px solid var(--border);background:var(--s2);color:var(--text);font-family:var(--font);font-size:.7rem}
.scn-url:focus{outline:none;border-color:var(--gold)}
.scn-url::placeholder{color:var(--dim)}
.scn-go{padding:.4rem .8rem;border-radius:5px;border:1px solid var(--gold);background:var(--gold-dim);color:var(--gold);font-family:var(--font);font-size:.65rem;cursor:pointer;font-weight:700}
.scn-go:hover{background:var(--gold);color:#000}

/* Step Bar */
.steps{display:flex;align-items:center;justify-content:center;padding:1rem 2rem;gap:0;background:var(--s1);border-bottom:1px solid var(--border)}
.step-item{display:flex;align-items:center}
.step-box{padding:.5rem 1.2rem;border:2px solid var(--border);border-radius:8px;text-align:center;cursor:pointer;transition:all .2s;min-width:100px;background:transparent}
.step-box:hover{border-color:var(--dim)}
.step-box.active{border-color:var(--gold);background:var(--gold);color:#000}
.step-box.done{border-color:var(--gold-border);background:var(--gold-dim)}
.step-num{font-family:var(--font);font-size:.65rem;font-weight:800;display:block}
.step-box.active .step-num{color:#000}
.step-box.done .step-num{color:var(--gold)}
.step-label{font-size:.7rem;margin-top:.15rem;display:block}
.step-box.active .step-label{color:#000;font-weight:600}
.step-box.done .step-label{color:var(--gold)}
.step-connector{width:28px;height:2px;background:var(--border);position:relative;display:flex;align-items:center;justify-content:center}
.step-connector.done{background:var(--gold-border)}
.step-connector .conn-badge{position:absolute;font-family:var(--font);font-size:.5rem;color:var(--gold);background:var(--s1);padding:0 .2rem;white-space:nowrap}

/* 4-Panel Grid */
.grid{display:grid;grid-template-columns:1fr 1fr;margin:0 1.5rem}
.panel{border:1px solid var(--border);background:var(--s1);min-height:280px;overflow:hidden}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:.6rem 1rem;border-bottom:1px solid var(--border);background:var(--s2)}
.panel-hdr .ph-left{display:flex;align-items:center;gap:.4rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.panel-hdr .ph-right{font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.panel-hdr .ph-icon{font-size:.9rem}
.ph-perception{color:var(--pink)}
.ph-structure{color:var(--cyan)}
.ph-source{color:var(--purple)}
.ph-time{color:var(--warn)}
.panel-body{padding:.8rem 1rem;max-height:340px;overflow-y:auto}

/* Fake Browser */
.browser{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#0a0a14;margin-bottom:.5rem}
.browser-chrome{display:flex;align-items:center;gap:.5rem;padding:.4rem .7rem;background:var(--s2);border-bottom:1px solid var(--border)}
.dot{width:8px;height:8px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}
.browser-url{flex:1;font-family:var(--font);font-size:.6rem;color:var(--dim);background:var(--s3);padding:.25rem .5rem;border-radius:4px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.browser-body{padding:.8rem;font-size:.75rem;line-height:1.5;min-height:120px}
.browser-body h3{font-size:.85rem;font-weight:700;margin-bottom:.3rem;color:var(--text)}
.browser-body .subtitle{color:var(--dim);font-size:.7rem;margin-bottom:.6rem}
.browser-body .event-card{padding:.4rem .6rem;border:1px solid var(--border);border-radius:5px;margin-bottom:.3rem;font-size:.7rem;transition:all .2s}
.browser-body .event-card:hover{border-color:var(--dim)}
.browser-body .event-card.highlight{border-color:var(--gold);background:rgba(232,185,49,.06)}
.browser-body .event-card .ec-title{font-weight:600;color:var(--text)}
.browser-body .event-card .ec-sub{color:var(--dim);font-size:.6rem}
.browser-body .ec-warn{color:var(--danger);font-size:.6rem;font-weight:600}
.browser-body .cta-btn{display:block;width:100%;padding:.5rem;border-radius:5px;background:var(--danger);color:#fff;text-align:center;font-weight:700;font-size:.75rem;margin-top:.5rem;border:none;cursor:default}
.browser-body .cta-btn.gold{background:var(--gold);color:#000}
.browser-body .form-field{display:block;width:100%;padding:.35rem .5rem;border:1px solid var(--border);border-radius:4px;background:var(--s3);color:var(--dim);font-size:.65rem;margin-bottom:.3rem;font-family:var(--sans)}
.browser-body .checkout-row{display:flex;justify-content:space-between;font-size:.7rem;padding:.2rem 0}
.browser-body .checkout-total{font-weight:700;border-top:1px solid var(--border);padding-top:.3rem;margin-top:.3rem}
.browser-footnote{font-size:.65rem;color:var(--dim);font-style:italic;padding:.4rem .8rem;border-top:1px solid rgba(42,42,72,.3)}

/* Cookie Cards */
.ck-card{border:1px solid var(--border);border-radius:6px;padding:.6rem .8rem;margin-bottom:.5rem;background:var(--s2);transition:all .3s}
.ck-card.new{border-color:var(--cyan);background:rgba(6,182,212,.04)}
.ck-header{display:flex;align-items:center;gap:.5rem;margin-bottom:.3rem}
.ck-name{font-family:var(--font);font-size:.75rem;font-weight:700;color:var(--gold)}
.ck-value{font-family:var(--font);font-size:.6rem;color:var(--dim);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ck-badge{font-family:var(--font);font-size:.55rem;font-weight:800;padding:.15rem .4rem;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.ck-created{background:rgba(6,182,212,.15);color:var(--cyan)}
.ck-read{background:rgba(232,185,49,.15);color:var(--gold)}
.ck-desc{font-size:.7rem;color:var(--dim);line-height:1.4}

/* Network Requests */
.nr-item{margin-bottom:.6rem;padding-bottom:.6rem;border-bottom:1px solid rgba(42,42,72,.3)}
.nr-item:last-child{border-bottom:none}
.nr-header{display:flex;align-items:center;gap:.4rem;margin-bottom:.3rem}
.nr-badge{font-family:var(--font);font-size:.55rem;font-weight:800;padding:.15rem .4rem;border-radius:3px;text-transform:uppercase}
.nr-send{background:rgba(168,85,247,.2);color:var(--purple)}
.nr-get{background:rgba(59,130,246,.15);color:var(--info)}
.nr-type{font-size:.7rem;font-weight:700;color:var(--text)}
.nr-url{font-family:var(--font);font-size:.6rem;color:var(--dim);word-break:break-all}
.nr-params{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.3rem}
.nr-param{font-family:var(--font);font-size:.55rem;padding:.15rem .4rem;border-radius:3px}
.nr-param-r{background:var(--red-tag);color:var(--red-tag-text)}
.nr-param-g{background:var(--green-tag);color:var(--green-tag-text)}
.nr-param-b{background:var(--blue-tag);color:var(--blue-tag-text)}
.nr-param-y{background:rgba(232,185,49,.12);color:var(--gold)}
.nr-note{font-size:.6rem;color:var(--dim);font-style:italic;margin-top:.3rem}

/* Timeline */
.tl-item{display:flex;gap:.8rem;margin-bottom:.8rem;position:relative}
.tl-dot-col{display:flex;flex-direction:column;align-items:center;width:12px;flex-shrink:0}
.tl-dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--border);background:var(--s2);flex-shrink:0;z-index:1}
.tl-dot.active{border-color:var(--gold);background:var(--gold)}
.tl-dot.meta{border-color:var(--meta);background:var(--meta)}
.tl-dot.danger{border-color:var(--danger);background:var(--danger)}
.tl-line{width:2px;flex:1;background:var(--border);margin-top:2px}
.tl-body{flex:1;padding-bottom:.3rem}
.tl-time{font-family:var(--font);font-size:.55rem;color:var(--dim);margin-bottom:.15rem}
.tl-title{font-size:.75rem;font-weight:700;color:var(--text);margin-bottom:.2rem}
.tl-desc{font-size:.65rem;color:var(--dim);line-height:1.4;margin-bottom:.3rem}
.tl-tags{display:flex;gap:.3rem;flex-wrap:wrap}
.tl-tag{font-family:var(--font);font-size:.5rem;padding:.12rem .35rem;border-radius:3px;font-weight:600}
.tl-tag-site{background:var(--green-tag);color:var(--green-tag-text)}
.tl-tag-meta{background:var(--red-tag);color:var(--red-tag-text)}
.tl-tag-ig{background:rgba(168,85,247,.2);color:var(--purple)}

/* Meta Knows Bar */
.meta-bar{margin:0 1.5rem;border:2px solid var(--gold-border);border-radius:8px;padding:.8rem 1rem;background:rgba(232,185,49,.04)}
.meta-bar-title{font-family:var(--font);font-size:.65rem;font-weight:800;color:var(--gold);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.5rem}
.meta-tags{display:flex;flex-wrap:wrap;gap:.3rem}
.meta-tag{font-family:var(--font);font-size:.6rem;padding:.2rem .5rem;border-radius:4px;background:var(--s3);color:var(--dim);border:1px solid var(--border);transition:all .3s}
.meta-tag.new{background:rgba(232,185,49,.1);border-color:var(--gold-border);color:var(--gold)}
.meta-tag.danger{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red-tag-text)}

/* Navigation */
.nav{display:flex;justify-content:center;gap:1rem;padding:1.5rem 2rem 2rem;align-items:center}
.nav-btn{padding:.6rem 1.5rem;border-radius:6px;font-family:var(--font);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .2s;border:none}
.nav-back{background:var(--s3);color:var(--dim);border:1px solid var(--border)}
.nav-back:hover{border-color:var(--dim);color:var(--text)}
.nav-next{background:var(--gold);color:#000}
.nav-next:hover{box-shadow:0 0 20px rgba(232,185,49,.3)}
.nav-btn:disabled{opacity:.3;cursor:default}

@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .35s ease}

@media(max-width:900px){.grid{grid-template-columns:1fr;margin:0 .5rem}.steps{flex-wrap:wrap;gap:.3rem}.meta-bar{margin:0 .5rem}}
</style>
</head>
<body>

<div class="hdr">
  <h1>Meta Tracking Deep Explorer</h1>
  <p>Click through each step. All four layers update simultaneously.</p>
</div>

<div class="scenarios">
  <label>Scenario:</label>
  <button class="scn-btn active" onclick="loadScenario('concert')">Concert Tickets</button>
  <button class="scn-btn" onclick="loadScenario('shopping')">Online Shopping</button>
  <button class="scn-btn" onclick="loadScenario('news')">News Article</button>
  <button class="scn-btn" onclick="loadScenario('flights')">Flight Booking</button>
  <button class="scn-btn" onclick="loadScenario('jobs')">Job Search</button>
  <input class="scn-url" id="customUrl" placeholder="Or type any URL (e.g. zillow.com/homes/seattle)..." />
  <button class="scn-go" onclick="loadCustom()">Go</button>
</div>

<div class="steps" id="stepsBar"></div>
<div class="grid" id="grid">
  <div class="panel"><div class="panel-hdr"><span class="ph-left ph-perception"><span class="ph-icon">&#x1f441;</span> Perception</span><span class="ph-right">what you see</span></div><div class="panel-body" id="p-perception"></div></div>
  <div class="panel"><div class="panel-hdr"><span class="ph-left ph-structure"><span class="ph-icon">&#x1f9ec;</span> Structure</span><span class="ph-right">cookies right now</span></div><div class="panel-body" id="p-structure"></div></div>
  <div class="panel"><div class="panel-hdr"><span class="ph-left ph-source"><span class="ph-icon">&#x1f517;</span> Source</span><span class="ph-right">network requests this step</span></div><div class="panel-body" id="p-source"></div></div>
  <div class="panel"><div class="panel-hdr"><span class="ph-left ph-time"><span class="ph-icon">&#x1f552;</span> Time</span><span class="ph-right">cumulative timeline</span></div><div class="panel-body" id="p-time"></div></div>
</div>
<div class="meta-bar" id="metaBar"></div>
<div class="nav">
  <button class="nav-btn nav-back" id="btnBack" onclick="prevStep()">&#x2190; Back</button>
  <button class="nav-btn nav-next" id="btnNext" onclick="nextStep()">Next: Browse events &#x2192;</button>
</div>

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let scenario = SCENARIOS.concert;
let step = 0;
let allMetaKnows = [];

// ═══════════════════════════════════════════════════════════
// CUSTOM URL SCENARIO GENERATOR
// ═══════════════════════════════════════════════════════════
function generateCustomScenario(url) {
  const domain = url.replace(/https?:\/\//,'').split('/')[0].replace('www.','');
  const path = url.replace(/https?:\/\//,'').split('/').slice(1).join('/') || '';
  const name = domain.charAt(0).toUpperCase() + domain.slice(1);
  return { name: name, steps: [
    { label:'Page loads', next:'Browse content',
      perception: { url: url, title: name + ' - Home', subtitle: 'You just visited ' + domain, items:[{title:'Main content area',sub:'The page looks completely normal.'},{title:'Navigation, images, text',sub:'Standard website layout.'}], footnote:'A normal-looking page. But tracking scripts are already running.' },
      structure: [
        {name:'_fbp',value:'fb.1.'+Date.now()+'.'+Math.floor(Math.random()*9999999999),status:'created',desc:'Meta Pixel generated your browser fingerprint. '+name+' runs Meta ads, so the pixel is embedded on every page.'},
        {name:'_ga',value:'GA1.2.'+Math.floor(Math.random()*9999999999)+'.'+Date.now(),status:'created',desc:'Google Analytics cookie. '+name+' uses GA to track visitor behavior.'}],
      source: [
        {type:'Browser',badge:'get',url:'GET connect.facebook.net/en_US/fbevents.js',params:[{t:'Size: 62.4 KB',c:'b'},{t:'Type: Meta Pixel SDK',c:'r'}]},
        {type:'Browser',badge:'send',url:'POST facebook.com/tr/?ev=PageView',params:[{t:'dl: '+domain+'/'+path,c:'g'},{t:'_fbp: [your browser ID]',c:'r'}]}],
      time: [
        {ts:'0:00.000',title:'You visit '+domain,desc:'Page loaded normally.',tags:[domain],dot:'active'},
        {ts:'0:00.350',title:'_fbp planted + PageView sent',desc:'Meta now knows you visited '+domain+', your browser fingerprint, and your referrer.',tags:[domain,'facebook.com'],dot:'meta'}],
      metaKnows: ['Browser fingerprint','IP address','Page: '+domain+'/'+path,'Screen resolution','Timezone','Language','Device type'] },
    { label:'Browse content', next:'Interact',
      perception: { url: url, title: name, subtitle: 'Browsing...', items:[{title:'You scroll and read content',sub:'Hovering over items, clicking links.'},{title:'Everything feels normal',sub:'No visible indication of tracking.'}], footnote:'Normal browsing. Meta is recording your scroll depth, hover targets, and time on page.' },
      structure: [{name:'_fbp',value:'fb.1.'+Date.now()+'.'+Math.floor(Math.random()*9999999999),status:'read',desc:'Pixel reads your _fbp on every interaction to correlate behavior with your browser ID.'}],
      source: [{type:'Browser',badge:'send',url:'POST facebook.com/tr/?ev=scroll_depth',params:[{t:'ScrolledAt: 70%',c:'y'},{t:'Time: 15s',c:'y'}]}],
      time: [{ts:'0:15.000',title:'Engagement tracked',desc:'Scroll depth, time, and hover behavior sent to Meta.',tags:[domain,'facebook.com'],dot:'meta'}],
      metaKnows: ['Scroll depth: 70%','Time on page: 15s','Content interests detected'] },
    { label:'Interact', next:'Convert',
      perception: { url: url+'?action=true', title: name + ' - Action', subtitle: 'You clicked something', body:'You interacted with the page - clicked a product, article, or button.', footnote:'Your click triggered a ViewContent event to Meta with details about what you engaged with.' },
      structure: [{name:'_fbp',value:'fb.1.'+Date.now()+'.'+Math.floor(Math.random()*9999999999),status:'read',desc:'ViewContent event fired. Meta knows exactly what caught your attention.'}],
      source: [{type:'Browser',badge:'send',url:'POST facebook.com/tr/?ev=ViewContent',params:[{t:'content_name: [page content]',c:'r'},{t:'_fbp: [your ID]',c:'r'}]}],
      time: [{ts:'0:30.000',title:'ViewContent event fired',desc:'Meta records what you clicked on. Your interest profile updates in real time.',tags:[domain,'facebook.com'],dot:'meta'}],
      metaKnows: ['Specific content viewed','Interest category inferred','Engagement level: medium-high'] },
    { label:'Convert', next:null,
      perception: { url: url+'?complete=true', isConfirm: true, footnote:'Whatever you did - signed up, purchased, subscribed - Meta captured the conversion event with full details.' },
      structure: [{name:'_fbp',value:'fb.1.'+Date.now()+'.'+Math.floor(Math.random()*9999999999),status:'read',desc:'Conversion event. Full attribution chain recorded.'}],
      source: [{type:'Browser',badge:'send',url:'POST facebook.com/tr/?ev=Purchase',params:[{t:'Conversion data sent to Meta',c:'r'}]}],
      time: [{ts:'1:00.000',title:'Conversion recorded',desc:'Meta has your complete journey: arrival -> browse -> interest -> conversion. Your profile is permanently updated.',tags:[domain,'facebook.com'],dot:'danger'}],
      metaKnows: ['CONVERSION recorded','Full journey: attributed','Profile: permanently updated'] }
  ]};
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  renderSteps();
  const s = scenario.steps[step];
  renderPerception(s); renderStructure(s); renderSource(s); renderTime(); renderMetaBar(s); renderNav(s);
}

function renderSteps() {
  const bar = document.getElementById('stepsBar');
  bar.innerHTML = scenario.steps.map((s,i) => {
    const cls = i===step?'active':i<step?'done':'';
    const conn = i < scenario.steps.length-1 ? `<div class="step-connector ${i<step?'done':''}"><span class="conn-badge">${i<step?'\\2713':''}</span></div>` : '';
    return `<div class="step-item"><div class="step-box ${cls}" onclick="goTo(${i})"><span class="step-num">${String(i+1).padStart(2,'0')}</span><span class="step-label">${s.label}</span></div>${conn}</div>`;
  }).join('');
}

function renderPerception(s) {
  const el = document.getElementById('p-perception');
  const p = s.perception;
  let bodyHTML = '';

  if (p.isCheckout) {
    bodyHTML = `<h3>Checkout</h3>${(p.checkoutItems||[]).map(ci => ci.item ? `<div class="checkout-row"><span>${esc(ci.item)}</span><span>${esc(ci.price)}</span></div>${ci.fee?'<div class="checkout-row" style="font-size:.6rem;color:var(--dim)"><span>${esc(ci.fee)}</span><span>${ci.fee&&!ci.item?esc(ci.price):''}</span></div>':''}` : `<div class="checkout-row" style="font-size:.6rem;color:var(--dim)"><span>${esc(ci.fee)}</span><span>${esc(ci.price)}</span></div>`).join('')}<div class="checkout-row checkout-total"><span>Total</span><span>${esc(p.total)}</span></div><div class="form-field" style="margin-top:.6rem">Email address</div><div class="form-field">First name</div><div class="form-field">Last name</div>`;
  } else if (p.isForm) {
    bodyHTML = `<h3>Enter Your Details</h3><div class="form-field">Email address</div><div class="form-field">First name</div><div class="form-field">Last name</div><div class="form-field">Phone number</div>`;
  } else if (p.isConfirm) {
    bodyHTML = `<h3 style="color:var(--safe)">Order Confirmed!</h3><p style="font-size:.7rem;color:var(--dim);margin-top:.3rem">Confirmation sent to your email. Thank you for your purchase.</p>`;
  } else {
    bodyHTML = `<h3>${esc(p.title)}</h3><div class="subtitle">${esc(p.subtitle||'')}</div>`;
    if (p.body) bodyHTML += `<p style="font-size:.7rem;color:var(--dim);margin:.4rem 0;white-space:pre-line">${esc(p.body)}</p>`;
    if (p.items) bodyHTML += p.items.map(it => `<div class="event-card ${it.highlight?'highlight':''}"><span class="ec-title">${esc(it.title)}</span><br><span class="ec-sub">${esc(it.sub)}</span>${it.warn?' <span class="ec-warn">'+esc(it.warn)+'</span>':''}</div>`).join('');
    if (p.hasTicket) bodyHTML += `<div style="margin-top:.5rem;padding:.5rem;border:1px solid var(--border);border-radius:5px"><strong style="font-size:.75rem">${esc(p.ticketLabel)}</strong><br><span style="font-size:.65rem;color:var(--dim)">${esc(p.ticketPrice)}</span></div><button class="cta-btn">Get Tickets</button>`;
    if (p.isCart) bodyHTML += `<button class="cta-btn gold">View Bag (1)</button>`;
  }

  el.innerHTML = `<div class="browser fade-in"><div class="browser-chrome"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span><span class="browser-url">${esc(p.url||'')}</span></div><div class="browser-body">${bodyHTML}</div><div class="browser-footnote">${esc(p.footnote||'')}</div></div>`;
}

function renderStructure(s) {
  const el = document.getElementById('p-structure');
  el.innerHTML = (s.structure||[]).map(c => `<div class="ck-card ${c.status==='created'?'new':''} fade-in"><div class="ck-header"><span class="ck-name">${esc(c.name)}</span><span class="ck-value">${esc(c.value)}</span><span class="ck-badge ${c.status==='created'?'ck-created':'ck-read'}">${c.status}</span></div><div class="ck-desc">${esc(c.desc)}</div></div>`).join('');
}

function renderSource(s) {
  const el = document.getElementById('p-source');
  el.innerHTML = (s.source||[]).map(r => `<div class="nr-item fade-in"><div class="nr-header"><span class="nr-badge ${r.badge==='send'?'nr-send':'nr-get'}">${r.badge}</span><span class="nr-type">${esc(r.type)}</span></div><div class="nr-url">${esc(r.url)}</div>${r.params&&r.params.length?'<div class="nr-params">'+r.params.map(p=>'<span class="nr-param nr-param-'+p.c+'">'+esc(p.t)+'</span>').join('')+'</div>':''}${r.note?'<div class="nr-note">'+esc(r.note)+'</div>':''}</div>`).join('');
}

function renderTime() {
  const el = document.getElementById('p-time');
  let items = [];
  for (let i = 0; i <= step; i++) { (scenario.steps[i].time||[]).forEach(t => items.push(t)); }
  el.innerHTML = items.map((t,i) => `<div class="tl-item fade-in"><div class="tl-dot-col"><div class="tl-dot ${t.dot||''}" title="${t.dot}"></div>${i<items.length-1?'<div class="tl-line"></div>':''}</div><div class="tl-body"><div class="tl-time">${esc(t.ts)}</div><div class="tl-title">${esc(t.title)}</div><div class="tl-desc">${esc(t.desc)}</div><div class="tl-tags">${(t.tags||[]).map(tg=>'<span class="tl-tag '+(tg.includes('facebook')||tg.includes('instagram')?'tl-tag-meta':tg.includes('linkedin')?'tl-tag-ig':'tl-tag-site')+'">'+esc(tg)+'</span>').join('')}</div></div></div>`).join('');
  el.scrollTop = el.scrollHeight;
}

function renderMetaBar(s) {
  allMetaKnows = [];
  for (let i = 0; i <= step; i++) { (scenario.steps[i].metaKnows||[]).forEach(m => { if (!allMetaKnows.includes(m)) allMetaKnows.push(m); }); }
  const newOnes = s.metaKnows || [];
  const el = document.getElementById('metaBar');
  el.innerHTML = `<div class="meta-bar-title">What Meta knows about you after step ${step+1}</div><div class="meta-tags">${allMetaKnows.map(m => {
    const isNew = newOnes.includes(m);
    const isDanger = m.startsWith('PURCHASE') || m.startsWith('APPLICATION') || m.startsWith('CHECKOUT') || m.includes('INTENT') || m.includes('Retarget') || m.includes('Sensitive');
    return `<span class="meta-tag ${isNew?'new':''} ${isDanger?'danger':''}">${esc(m)}</span>`;
  }).join('')}</div>`;
}

function renderNav(s) {
  document.getElementById('btnBack').disabled = step === 0;
  const next = document.getElementById('btnNext');
  if (step >= scenario.steps.length - 1) { next.innerHTML = 'Journey complete'; next.disabled = true; }
  else { next.innerHTML = 'Next: ' + s.next + ' &#x2192;'; next.disabled = false; }
}

function goTo(i) { step = i; render(); window.scrollTo({top:document.getElementById('stepsBar').offsetTop - 10, behavior:'smooth'}); }
function nextStep() { if (step < scenario.steps.length-1) goTo(step+1); }
function prevStep() { if (step > 0) goTo(step-1); }

function loadScenario(key) {
  scenario = SCENARIOS[key]; step = 0; allMetaKnows = [];
  document.querySelectorAll('.scn-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.scn-btn[onclick="loadScenario('${key}')"]`)?.classList.add('active');
  render();
}

function loadCustom() {
  const url = document.getElementById('customUrl').value.trim();
  if (!url) return;
  document.querySelectorAll('.scn-btn').forEach(b => b.classList.remove('active'));
  scenario = generateCustomScenario(url); step = 0; allMetaKnows = [];
  render();
}

function esc(s) { if (!s) return ''; const d=document.createElement('div'); d.textContent=String(s); return d.innerHTML; }

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') nextStep();
  if (e.key==='ArrowLeft') prevStep();
});
document.getElementById('customUrl').addEventListener('keydown', e => { if (e.key==='Enter') loadCustom(); });

render();
</script>
